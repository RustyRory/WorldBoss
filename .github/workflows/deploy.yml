name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'worldboss-app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www

            # Pull du code
            if [ ! -d "WorldBoss" ]; then
              git clone https://github.com/${{ github.repository }} WorldBoss
            else
              git -C WorldBoss pull origin main
            fi

            # Rebuild uniquement les services WorldBoss
            docker compose build worldboss-bot
            docker compose up -d --no-deps worldboss-bot worldboss-db worldboss-redis

            # Nettoyage des images orphelines
            docker image prune -f
